# ============================================================
# Cloud Clip Lite — Docker Compose
# 一键启动：docker compose up -d
# ============================================================

services:
  # ---- 主应用 ----
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-clip-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-closed}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - DATABASE_URL=postgres://clip:${POSTGRES_PASSWORD:-clipsecret}@db:5432/cloudclip?sslmode=disable
      - BLOB_STORE=local
      - BLOB_LOCAL_DIR=/app/data/blobs
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - LOG_FORMAT=json
      - LOG_LEVEL=info
      - DEFAULT_MAX_ITEM_SIZE=${DEFAULT_MAX_ITEM_SIZE:-10485760}
      - DEFAULT_QUOTA_BYTES=${DEFAULT_QUOTA_BYTES:-1073741824}
      - DEFAULT_RETENTION_DAYS=${DEFAULT_RETENTION_DAYS:-30}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    volumes:
      - server-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    # 注意：最终镜像为 distroless（无 shell/wget），无法使用容器内健康检查命令，
    # 如需健康检查请在编排层或外部探针中探测 /healthz。

  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: cloud-clip-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=clip
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-clipsecret}
      - POSTGRES_DB=cloudclip
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clip -d cloudclip"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Caddy 反向代理（自动 TLS）----
  # 取消注释以启用 Caddy 自动 HTTPS
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: cloud-clip-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     - server

volumes:
  server-data:
  db-data:
